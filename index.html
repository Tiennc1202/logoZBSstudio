<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logo ZBS Studio - Precision Logo Processing</title>
    
    <!-- Thư viện React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel để biên dịch JSX ngay trên trình duyệt -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Framer Motion (Animation) -->
    <script src="https://unpkg.com/framer-motion@11.0.8/dist/framer-motion.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@1,400;1,500;1,600&display=swap');

        :root {
            --font-sans: 'Inter', sans-serif;
            --font-serif: 'Playfair Display', serif;
        }

        body {
            font-family: var(--font-sans);
            background-color: #F5F5F0;
            color: #141414;
        }

        .font-serif {
            font-family: var(--font-serif);
        }

        /* Hiệu ứng nền ô vuông cho bản xem trước */
        .bg-checkerboard {
            background-image: linear-gradient(45deg, #e5e5e5 25%, transparent 25%),
                linear-gradient(-45deg, #e5e5e5 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #e5e5e5 75%),
                linear-gradient(-45deg, transparent 75%, #e5e5e5 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            background-color: white;
        }

        .bg-checkerboard-dark {
            background-image: linear-gradient(45deg, #2a2a2a 25%, transparent 25%),
                linear-gradient(-45deg, #2a2a2a 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #2a2a2a 75%),
                linear-gradient(-45deg, transparent 75%, #2a2a2a 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            background-color: #1a1a1a;
        }

        /* Thanh cuộn tùy chỉnh */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #F5F5F0;
        }
        ::-webkit-scrollbar-thumb {
            background: #14141420;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #14141440;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect, useCallback } = React;
        const { motion, AnimatePresence } = window.Motion;

        // Thành phần hỗ trợ hiển thị Icon Lucide trong React
        const Icon = ({ name, size = 24, className = "", strokeWidth = 2 }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current) {
                    lucide.createIcons({
                        targets: [iconRef.current],
                        icons: { [name]: lucide.icons[name] },
                        attrs: {
                            'stroke-width': strokeWidth,
                            class: className,
                            width: size,
                            height: size
                        }
                    });
                }
            }, [name, size, className, strokeWidth]);

            return <i ref={iconRef} data-lucide={name}></i>;
        };

        function App() {
            const [logo, setLogo] = useState(null);
            const [lightColors, setLightColors] = useState([]);
            const [darkColors, setDarkColors] = useState([]);
            const [isDragging, setIsDragging] = useState(false);
            const [isProcessing, setIsProcessing] = useState(false);
            const [loadingCaption, setLoadingCaption] = useState("");
            const [copiedIndex, setCopiedIndex] = useState(null);
            const canvasRefLight = useRef(null);
            const canvasRefDark = useRef(null);
            const fileInputRef = useRef(null);

            const CANVAS_WIDTH = 400;
            const CANVAS_HEIGHT = 96;

            // Chuyển đổi màu sắc
            const rgbToHex = (r, g, b) => {
                return "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1).toUpperCase();
            };

            const hexToRgb = (hex) => {
                const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
                return result ? {
                    r: parseInt(result[1], 16),
                    g: parseInt(result[2], 16),
                    b: parseInt(result[3], 16)
                } : null;
            };

            const colorDistance = (hex1, hex2) => {
                const rgb1 = hexToRgb(hex1);
                const rgb2 = hexToRgb(hex2);
                if (!rgb1 || !rgb2) return Infinity;
                return Math.sqrt(
                    Math.pow(rgb1.r - rgb2.r, 2) +
                    Math.pow(rgb1.g - rgb2.g, 2) +
                    Math.pow(rgb1.b - rgb2.b, 2)
                );
            };

            // Trích xuất màu từ ảnh
            const extractColors = (img) => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                if (!ctx) return [];

                const maxDim = 300;
                const scale = Math.min(maxDim / img.width, maxDim / img.height, 1);
                canvas.width = img.width * scale;
                canvas.height = img.height * scale;
                
                ctx.imageSmoothingEnabled = false;
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
                const colorCounts = {};

                for (let i = 0; i < imageData.length; i += 4) {
                    const r = imageData[i];
                    const g = imageData[i + 1];
                    const b = imageData[i + 2];
                    const a = imageData[i + 3];

                    if (a < 30) continue;

                    const hex = rgbToHex(r, g, b);
                    colorCounts[hex] = (colorCounts[hex] || 0) + 1;
                }

                const rawColors = Object.entries(colorCounts)
                    .sort((a, b) => b[1] - a[1]);
                
                const distinctColors = [];
                const SIMILARITY_THRESHOLD = 30;

                for (const [hex] of rawColors) {
                    const isSimilar = distinctColors.some(dc => colorDistance(hex, dc) < SIMILARITY_THRESHOLD);
                    if (!isSimilar) {
                        distinctColors.push(hex);
                    }
                    if (distinctColors.length >= 20) break;
                }

                return distinctColors;
            };

            const adjustForDarkMode = (hex) => {
                const rgb = hexToRgb(hex);
                if (!rgb) return hex;
                const luminance = (0.2126 * rgb.r + 0.7152 * rgb.g + 0.0722 * rgb.b);
                if (luminance < 60) return "#FFFFFF";
                return hex;
            };

            const funnyCaptions = [
                "Sắp tới dòi sắp tới dòi... 🚀",
                "Chờ một xiusuuuuuuuuuu coiiiiiii... 🐢",
                "Đang nặn logo cho đẹp nè, đừng hối... 🎨",
                "Logo đang đi spa, xíu quay lại liền... ✨",
                "Đang pha màu, đợi xíu nha quý vị... 🧪",
                "Máy tính đang suy nghĩ, đừng làm phiền nó... 🧠",
                "Đang gọt giũa từng pixel một... 💎"
            ];

            useEffect(() => {
                let interval;
                if (isProcessing) {
                    setLoadingCaption(funnyCaptions[0]);
                    let index = 1;
                    interval = setInterval(() => {
                        setLoadingCaption(funnyCaptions[index % funnyCaptions.length]);
                        index++;
                    }, 7000);
                }
                return () => clearInterval(interval);
            }, [isProcessing]);

            // Tự động tách nền
            const removeBackground = (img) => {
                return new Promise((resolve) => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    if (!ctx) {
                        resolve(img);
                        return;
                    }

                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);

                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const data = imageData.data;

                    let hasTransparency = false;
                    for (let i = 3; i < data.length; i += 4) {
                        if (data[i] < 250) {
                            hasTransparency = true;
                            break;
                        }
                    }

                    if (hasTransparency) {
                        resolve(img);
                        return;
                    }

                    const corners = [
                        { r: data[0], g: data[1], b: data[2] },
                        { r: data[(canvas.width - 1) * 4], g: data[(canvas.width - 1) * 4 + 1], b: data[(canvas.width - 1) * 4 + 2] },
                        { r: data[(canvas.height - 1) * canvas.width * 4], g: data[(canvas.height - 1) * canvas.width * 4 + 1], b: data[(canvas.height - 1) * canvas.width * 4 + 2] },
                        { r: data[((canvas.height * canvas.width) - 1) * 4], g: data[((canvas.height * canvas.width) - 1) * 4 + 1], b: data[((canvas.height * canvas.width) - 1) * 4 + 2] }
                    ];

                    const counts = {};
                    corners.forEach(c => {
                        const key = `${c.r},${c.g},${c.b}`;
                        if (!counts[key]) counts[key] = { color: c, count: 0 };
                        counts[key].count++;
                    });

                    const bg = Object.values(counts).sort((a, b) => b.count - a.count)[0].color;
                    const tolerance = 40;

                    for (let i = 0; i < data.length; i += 4) {
                        const r = data[i];
                        const g = data[i + 1];
                        const b = data[i + 2];

                        const dist = Math.sqrt(
                            Math.pow(r - bg.r, 2) +
                            Math.pow(g - bg.g, 2) +
                            Math.pow(b - bg.b, 2)
                        );

                        if (dist < tolerance) {
                            data[i + 3] = 0;
                        }
                    }

                    ctx.putImageData(imageData, 0, 0);
                    const newImg = new Image();
                    newImg.onload = () => resolve(newImg);
                    newImg.src = canvas.toDataURL();
                });
            };

            const handleFileUpload = (file) => {
                if (!file.type.startsWith('image/')) return;

                setIsProcessing(true);
                
                setTimeout(() => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const img = new Image();
                        img.onload = async () => {
                            const processedImg = await removeBackground(img);
                            setLogo(processedImg);
                            const extracted = extractColors(processedImg);
                            setLightColors(extracted.map(hex => ({ original: hex, current: hex })));
                            setDarkColors(extracted.map(hex => ({ original: hex, current: adjustForDarkMode(hex) })));
                            setIsProcessing(false);
                        };
                        img.src = e.target?.result;
                    };
                    reader.readAsDataURL(file);
                }, 2500);
            };

            const onDrop = (e) => {
                e.preventDefault();
                setIsDragging(false);
                if (e.dataTransfer.files && e.dataTransfer.files[0]) {
                    handleFileUpload(e.dataTransfer.files[0]);
                }
            };

            const drawCanvas = useCallback((canvas, colorSet) => {
                if (!canvas || !logo || colorSet.length === 0) return;
                const ctx = canvas.getContext('2d');
                if (!ctx) return;

                ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

                const scale = Math.min(CANVAS_WIDTH / logo.width, CANVAS_HEIGHT / logo.height);
                const drawWidth = logo.width * scale;
                const drawHeight = logo.height * scale;
                const x = 0;
                const y = (CANVAS_HEIGHT - drawHeight) / 2;

                ctx.drawImage(logo, x, y, drawWidth, drawHeight);
                
                const imageData = ctx.getImageData(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
                const data = imageData.data;
                const colorCache = new Map();

                for (let i = 0; i < data.length; i += 4) {
                    const a = data[i + 3];
                    if (a === 0) continue;

                    const r = data[i];
                    const g = data[i + 1];
                    const b = data[i + 2];
                    const currentHex = rgbToHex(r, g, b);

                    if (!colorCache.has(currentHex)) {
                        let bestMatch = null;
                        let minDistance = 120;
                        
                        for (const color of colorSet) {
                            const dist = colorDistance(currentHex, color.original);
                            if (dist < minDistance) {
                                minDistance = dist;
                                bestMatch = color.current;
                            }
                        }
                        colorCache.set(currentHex, bestMatch ? hexToRgb(bestMatch) : null);
                    }

                    const targetRgb = colorCache.get(currentHex);
                    if (targetRgb) {
                        data[i] = targetRgb.r;
                        data[i + 1] = targetRgb.g;
                        data[i + 2] = targetRgb.b;
                    }
                }

                ctx.putImageData(imageData, 0, 0);
            }, [logo]);

            useEffect(() => {
                drawCanvas(canvasRefLight.current, lightColors);
            }, [drawCanvas, lightColors]);

            useEffect(() => {
                drawCanvas(canvasRefDark.current, darkColors);
            }, [drawCanvas, darkColors]);

            const updateColor = (index, newColor, mode) => {
                if (mode === 'light') {
                    const newColors = [...lightColors];
                    newColors[index] = { ...newColors[index], current: newColor.toUpperCase() };
                    setLightColors(newColors);
                } else {
                    const newColors = [...darkColors];
                    newColors[index] = { ...newColors[index], current: newColor.toUpperCase() };
                    setDarkColors(newColors);
                }
            };

            const updateAllColors = (newColor, mode) => {
                const hex = newColor.toUpperCase();
                if (mode === 'light') {
                    setLightColors(prev => prev.map(c => ({ ...c, current: hex })));
                } else {
                    setDarkColors(prev => prev.map(c => ({ ...c, current: hex })));
                }
            };

            const resetPalette = (mode) => {
                if (mode === 'light') {
                    setLightColors(prev => prev.map(c => ({ ...c, current: c.original })));
                } else {
                    setDarkColors(prev => prev.map(c => ({ ...c, current: adjustForDarkMode(c.original) })));
                }
            };

            const downloadImage = (canvas, filename) => {
                if (!canvas) return;
                const link = document.createElement('a');
                link.download = filename;
                link.href = canvas.toDataURL('image/png');
                link.click();
            };

            const reset = () => {
                setLogo(null);
                setLightColors([]);
                setDarkColors([]);
            };

            const copyToClipboard = (text, id) => {
                navigator.clipboard.writeText(text);
                setCopiedIndex(id);
                setTimeout(() => setCopiedIndex(null), 2000);
            };

            return (
                <div className="min-h-screen bg-[#F5F5F0] text-[#141414] p-4 md:p-8">
                    <AnimatePresence>
                        {isProcessing && (
                            <motion.div 
                                initial={{ opacity: 0 }}
                                animate={{ opacity: 1 }}
                                exit={{ opacity: 0 }}
                                className="fixed inset-0 z-50 bg-[#F5F5F0]/90 backdrop-blur-sm flex flex-col items-center justify-center p-6 text-center"
                            >
                                <motion.div
                                    animate={{ 
                                        rotate: 360,
                                        scale: [1, 1.1, 1],
                                    }}
                                    transition={{ 
                                        rotate: { duration: 2, repeat: Infinity, ease: "linear" },
                                        scale: { duration: 1, repeat: Infinity }
                                    }}
                                    className="mb-8"
                                >
                                    <Icon name="refresh-cw" size={64} strokeWidth={1} />
                                </motion.div>
                                <motion.p 
                                    key={loadingCaption}
                                    initial={{ opacity: 0, y: 10 }}
                                    animate={{ opacity: 1, y: 0 }}
                                    exit={{ opacity: 0, y: -10 }}
                                    className="text-xl font-serif italic"
                                >
                                    {loadingCaption}
                                </motion.p>
                                <div className="mt-12 w-48 h-1 bg-[#141414]/10 rounded-full overflow-hidden">
                                    <motion.div 
                                        initial={{ x: "-100%" }}
                                        animate={{ x: "100%" }}
                                        transition={{ duration: 2, repeat: Infinity, ease: "easeInOut" }}
                                        className="w-full h-full bg-[#141414]"
                                    />
                                </div>
                            </motion.div>
                        )}
                    </AnimatePresence>

                    <div className="max-w-4xl mx-auto">
                        <header className="mb-12 flex justify-between items-end border-b border-[#141414] pb-4">
                            <div>
                                <h1 className="text-4xl font-serif italic tracking-tight">Logo ZBS Studio</h1>
                                <p className="text-xs uppercase tracking-widest opacity-50 mt-2">400x96 Precision Processor</p>
                            </div>
                            {logo && (
                                <button 
                                    onClick={reset}
                                    className="flex items-center gap-2 text-xs uppercase tracking-widest hover:opacity-50 transition-opacity"
                                >
                                    <Icon name="refresh-cw" size={14} /> Reset
                                </button>
                            )}
                        </header>

                        <main>
                            {!logo ? (
                                <motion.div
                                    initial={{ opacity: 0, y: 20 }}
                                    animate={{ opacity: 1, y: 0 }}
                                    className={`
                                        relative border-2 border-dashed border-[#141414] rounded-xl p-12
                                        flex flex-col items-center justify-center transition-all duration-300 cursor-pointer
                                        ${isDragging ? 'bg-[#141414] text-[#F5F5F0] scale-[0.98]' : 'bg-white/50'}
                                    `}
                                    onDragOver={(e) => { e.preventDefault(); setIsDragging(true); }}
                                    onDragLeave={() => setIsDragging(false)}
                                    onDrop={onDrop}
                                    onClick={() => fileInputRef.current?.click()}
                                >
                                    <input 
                                        type="file" 
                                        ref={fileInputRef} 
                                        className="hidden" 
                                        accept="image/*"
                                        onChange={(e) => e.target.files?.[0] && handleFileUpload(e.target.files[0])}
                                    />
                                    <Icon name="upload" size={48} strokeWidth={1} className="mb-4" />
                                    <p className="text-lg font-medium">Drop your logo here</p>
                                    <p className="text-sm opacity-50 mt-1">or click to browse files</p>
                                </motion.div>
                            ) : (
                                <div className="space-y-12">
                                    {/* Bản xem trước */}
                                    <section className="grid gap-8 md:grid-cols-2">
                                        <div className="space-y-4">
                                            <div className="flex items-center gap-2 text-xs uppercase tracking-widest opacity-50">
                                                <Icon name="sun" size={14} /> Light Mode Preview
                                            </div>
                                            <div className="bg-checkerboard border border-[#141414]/10 rounded-lg p-8 flex items-center justify-center shadow-sm">
                                                <div className="relative group">
                                                    <canvas 
                                                        ref={canvasRefLight} 
                                                        width={CANVAS_WIDTH} 
                                                        height={CANVAS_HEIGHT}
                                                        className="border border-dashed border-[#141414]/20"
                                                    />
                                                    <button 
                                                        onClick={() => downloadImage(canvasRefLight.current, 'logo-light.png')}
                                                        className="absolute -bottom-12 left-1/2 -translate-x-1/2 opacity-0 group-hover:opacity-100 transition-opacity flex items-center gap-2 bg-[#141414] text-white px-4 py-2 rounded-full text-xs uppercase tracking-widest whitespace-nowrap"
                                                    >
                                                        <Icon name="download" size={14} /> Export Light
                                                    </button>
                                                </div>
                                            </div>
                                        </div>

                                        <div className="space-y-4">
                                            <div className="flex items-center gap-2 text-xs uppercase tracking-widest opacity-50">
                                                <Icon name="moon" size={14} /> Dark Mode Preview
                                            </div>
                                            <div className="bg-checkerboard-dark border border-white/10 rounded-lg p-8 flex items-center justify-center shadow-sm">
                                                <div className="relative group">
                                                    <canvas 
                                                        ref={canvasRefDark} 
                                                        width={CANVAS_WIDTH} 
                                                        height={CANVAS_HEIGHT}
                                                        className="border border-dashed border-white/20"
                                                    />
                                                    <button 
                                                        onClick={() => downloadImage(canvasRefDark.current, 'logo-dark.png')}
                                                        className="absolute -bottom-12 left-1/2 -translate-x-1/2 opacity-0 group-hover:opacity-100 transition-opacity flex items-center gap-2 bg-white text-[#141414] px-4 py-2 rounded-full text-xs uppercase tracking-widest whitespace-nowrap"
                                                    >
                                                        <Icon name="download" size={14} /> Export Dark
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    </section>

                                    {/* Điều khiển màu sắc */}
                                    <div className="grid gap-8 md:grid-cols-2">
                                        <section className="bg-white border border-[#141414] rounded-xl p-6">
                                            <div className="flex items-center gap-3 mb-6">
                                                <Icon name="sun" size={18} />
                                                <h2 className="text-lg font-serif italic">Light Mode Colors</h2>
                                            </div>

                                            <div className="mb-6 p-4 bg-[#F5F5F0] border border-[#141414]/10 rounded-xl flex items-center justify-between shadow-inner">
                                                <div className="flex flex-col gap-1">
                                                    <span className="text-[10px] uppercase tracking-widest font-bold opacity-40">Bulk Actions</span>
                                                    <button 
                                                        onClick={() => resetPalette('light')}
                                                        className="flex items-center gap-1.5 text-[10px] uppercase tracking-wider font-semibold text-[#141414] hover:opacity-60 transition-opacity"
                                                    >
                                                        <Icon name="rotate-ccw" size={12} /> Reset Palette
                                                    </button>
                                                </div>
                                                <div className="flex items-center gap-3">
                                                    <div className="flex flex-col items-end gap-1">
                                                        <span className="text-[9px] opacity-40 uppercase font-bold">Apply to All</span>
                                                        <div className="relative w-10 h-10 rounded-full overflow-hidden border-2 border-[#141414]/10 hover:border-[#141414]/30 transition-colors shadow-sm">
                                                            <input 
                                                                type="color" 
                                                                onChange={(e) => updateAllColors(e.target.value, 'light')}
                                                                className="absolute inset-0 opacity-0 cursor-pointer w-full h-full scale-150"
                                                            />
                                                            <div className="w-full h-full bg-white flex items-center justify-center">
                                                                <Icon name="pipette" size={16} className="text-[#141414] opacity-60" />
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                            
                                            <div className="grid grid-cols-2 sm:grid-cols-3 gap-4">
                                                {lightColors.map((color, index) => (
                                                    <div key={`light-${index}`} className="space-y-2">
                                                        <div className="flex items-center justify-between">
                                                            <span className="text-[9px] uppercase tracking-tighter opacity-40">Color {index + 1}</span>
                                                            <div 
                                                                className="w-3 h-3 rounded-full border border-[#141414]/10" 
                                                                style={{ backgroundColor: color.current }}
                                                            />
                                                        </div>
                                                        <div className="relative group">
                                                            <input 
                                                                type="color" 
                                                                value={color.current}
                                                                onChange={(e) => updateColor(index, e.target.value, 'light')}
                                                                className="absolute inset-0 opacity-0 cursor-pointer w-full h-full"
                                                            />
                                                            <div className="bg-[#F5F5F0] border border-[#141414]/20 rounded p-1.5 flex items-center justify-between font-mono text-[9px]">
                                                                <span>{color.current}</span>
                                                                <button 
                                                                    onClick={(e) => {
                                                                        e.stopPropagation();
                                                                        copyToClipboard(color.current, `light-${index}`);
                                                                    }}
                                                                    className="opacity-30 hover:opacity-100 transition-opacity"
                                                                >
                                                                    {copiedIndex === `light-${index}` ? <Icon name="check" size={10} className="text-green-600" /> : <Icon name="copy" size={10} />}
                                                                </button>
                                                            </div>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </section>

                                        <section className="bg-[#141414] text-white border border-white/20 rounded-xl p-6 shadow-xl">
                                            <div className="flex items-center gap-3 mb-6">
                                                <Icon name="moon" size={18} />
                                                <h2 className="text-lg font-serif italic">Dark Mode Colors</h2>
                                            </div>

                                            <div className="mb-6 p-4 bg-white/5 border border-white/10 rounded-xl flex items-center justify-between shadow-inner">
                                                <div className="flex flex-col gap-1">
                                                    <span className="text-[10px] uppercase tracking-widest font-bold opacity-40">Bulk Actions</span>
                                                    <button 
                                                        onClick={() => resetPalette('dark')}
                                                        className="flex items-center gap-1.5 text-[10px] uppercase tracking-wider font-semibold text-white hover:opacity-60 transition-opacity"
                                                    >
                                                        <Icon name="rotate-ccw" size={12} /> Reset Palette
                                                    </button>
                                                </div>
                                                <div className="flex items-center gap-3">
                                                    <div className="flex flex-col items-end gap-1">
                                                        <span className="text-[9px] opacity-40 uppercase font-bold">Apply to All</span>
                                                        <div className="relative w-10 h-10 rounded-full overflow-hidden border-2 border-white/10 hover:border-white/30 transition-colors shadow-sm">
                                                            <input 
                                                                type="color" 
                                                                onChange={(e) => updateAllColors(e.target.value, 'dark')}
                                                                className="absolute inset-0 opacity-0 cursor-pointer w-full h-full scale-150"
                                                            />
                                                            <div className="w-full h-full bg-[#141414] flex items-center justify-center">
                                                                <Icon name="pipette" size={16} className="text-white opacity-60" />
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                            
                                            <div className="grid grid-cols-2 sm:grid-cols-3 gap-4">
                                                {darkColors.map((color, index) => (
                                                    <div key={`dark-${index}`} className="space-y-2">
                                                        <div className="flex items-center justify-between">
                                                            <span className="text-[9px] uppercase tracking-tighter opacity-40">Color {index + 1}</span>
                                                            <div 
                                                                className="w-3 h-3 rounded-full border border-white/20" 
                                                                style={{ backgroundColor: color.current }}
                                                            />
                                                        </div>
                                                        <div className="relative group">
                                                            <input 
                                                                type="color" 
                                                                value={color.current}
                                                                onChange={(e) => updateColor(index, e.target.value, 'dark')}
                                                                className="absolute inset-0 opacity-0 cursor-pointer w-full h-full"
                                                            />
                                                            <div className="bg-white/10 border border-white/20 rounded p-1.5 flex items-center justify-between font-mono text-[9px]">
                                                                <span>{color.current}</span>
                                                                <button 
                                                                    onClick={(e) => {
                                                                        e.stopPropagation();
                                                                        copyToClipboard(color.current, `dark-${index}`);
                                                                    }}
                                                                    className="opacity-30 hover:opacity-100 transition-opacity"
                                                                >
                                                                    {copiedIndex === `dark-${index}` ? <Icon name="check" size={10} className="text-green-400" /> : <Icon name="copy" size={10} />}
                                                                </button>
                                                            </div>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </section>
                                    </div>
                                </div>
                            )}
                        </main>

                        <footer className="mt-24 pt-8 border-t border-[#141414]/10 flex flex-col items-center gap-4 opacity-50">
                            <div className="text-[10px] uppercase tracking-[0.2em] font-medium">
                                Đóng góp từ Nguyễn Công Tiền
                            </div>
                            <div className="text-[8px] uppercase tracking-widest">
                                © 2026 Logo ZBS Studio • Precision Logo Processing
                            </div>
                        </footer>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
